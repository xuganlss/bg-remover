name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_PAYPAL_PLAN_BASIC: P-2CN37042J7272960HNHDUIBI
          NEXT_PUBLIC_PAYPAL_PLAN_PRO: P-18582952CE534212TNHDUIWQ

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 196f3361ba6da40c48939c5b9bd5ff4a
